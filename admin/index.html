<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETIP Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50:'#eef7ff', 100:'#d9edff', 200:'#bce0ff', 300:'#8eccff', 400:'#59b0ff', 500:'#3390ff', 600:'#1a6df5', 700:'#1358e1', 800:'#1648b6', 900:'#183e8f', 950:'#132757' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .sidebar-link.active { background: rgba(255,255,255,.15); border-left: 3px solid #fff; }
    .sidebar-link:hover { background: rgba(255,255,255,.1); }
    .stat-card { transition: transform .15s, box-shadow .15s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
    .table-row:hover { background: #f8fafc; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .badge { padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .badge-success { background:#dcfce7; color:#166534; }
    .badge-warning { background:#fef9c3; color:#854d0e; }
    .badge-danger  { background:#fee2e2; color:#991b1b; }
    .badge-info    { background:#dbeafe; color:#1e40af; }
    .badge-gray    { background:#f1f5f9; color:#475569; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-900 to-brand-700">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-brand-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
          <span class="text-3xl">⚡</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">ETIP Admin</h1>
        <p class="text-gray-500 mt-1">Electricity Token Intermediary Platform</p>
      </div>
      <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm"></div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="login-email" placeholder="admin@etip.ng" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="login-password" placeholder="Enter admin password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
        </div>
        <button type="submit" id="login-btn"
          class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
          Sign In to Admin
        </button>
      </form>
      <p class="text-center text-xs text-gray-400 mt-6">Admin access only. Unauthorized access is logged.</p>
    </div>
  </div>

  <!-- ═══════════════ MAIN APP SHELL ═══════════════ -->
  <div id="app-shell" class="hidden min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-brand-900 text-white flex flex-col fixed h-full z-20">
      <div class="px-6 py-5 border-b border-brand-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center">
            <span class="text-xl">⚡</span>
          </div>
          <div>
            <h2 class="font-bold text-sm">ETIP Admin</h2>
            <p class="text-xs text-brand-300" id="admin-name">Administrator</p>
          </div>
        </div>
      </div>
      <nav class="flex-1 py-4 space-y-1 px-3">
        <a href="#" data-page="dashboard" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <span class="text-lg">📊</span> Dashboard
        </a>
        <a href="#" data-page="users" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <span class="text-lg">👥</span> Users
        </a>
        <a href="#" data-page="transactions" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <span class="text-lg">💰</span> Transactions
        </a>
        <a href="#" data-page="meters" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <span class="text-lg">⚡</span> Meters
        </a>
        <a href="#" data-page="audit" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
          <span class="text-lg">📋</span> Audit Logs
        </a>
      </nav>
      <div class="px-3 pb-4">
        <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-red-500/20 text-red-300 transition">
          <span class="text-lg">🚪</span> Sign Out
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 ml-64">
      <!-- Top bar -->
      <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <h1 id="page-title" class="text-xl font-bold text-gray-900">Dashboard</h1>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-500" id="current-date"></span>
          <div class="w-9 h-9 bg-brand-100 text-brand-700 rounded-full flex items-center justify-center font-bold text-sm" id="avatar-letter">A</div>
        </div>
      </header>

      <!-- Page content area -->
      <div class="p-6" id="page-content">
        <!-- Injected by JS -->
      </div>
    </main>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// ETIP Admin Dashboard — Single Page Application
// ═══════════════════════════════════════════════════════════════════════════════

// Auto-detect backend: same hostname as the browser, port 8000
const API_BASE = `http://${window.location.hostname}:8000/api/v1`;

// ── State ────────────────────────────────────────────────────────────────────
let accessToken = localStorage.getItem('admin_access_token') || '';
let refreshToken = localStorage.getItem('admin_refresh_token') || '';
let currentUser = JSON.parse(localStorage.getItem('admin_user') || 'null');
let currentPage = 'dashboard';

// ── API helpers ──────────────────────────────────────────────────────────────

function normalizePhone(raw) {
  let phone = raw.replace(/[\s\-]/g, '');
  if (phone.startsWith('0') && phone.length === 11) phone = '+234' + phone.slice(1);
  else if (phone.startsWith('234') && phone.length === 13) phone = '+' + phone;
  return phone;
}

async function api(path, options = {}) {
  const url = API_BASE + path;
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;

  let res = await fetch(url, { ...options, headers });

  // Try token refresh on 401
  if (res.status === 401 && refreshToken) {
    const refreshRes = await fetch(API_BASE + '/auth/token/refresh/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh: refreshToken }),
    });
    if (refreshRes.ok) {
      const data = await refreshRes.json();
      accessToken = data.access;
      localStorage.setItem('admin_access_token', accessToken);
      headers['Authorization'] = 'Bearer ' + accessToken;
      res = await fetch(url, { ...options, headers });
    } else {
      doLogout();
      throw new Error('Session expired');
    }
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.detail || `Error ${res.status}`);
  }
  return res.json();
}

// ── Auth ─────────────────────────────────────────────────────────────────────

async function doLogin(email, password) {
  const res = await fetch(API_BASE + '/auth/login/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email.trim().toLowerCase(), password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || data.detail || 'Login failed');

  accessToken = data.data.access;
  refreshToken = data.data.refresh;
  localStorage.setItem('admin_access_token', accessToken);
  localStorage.setItem('admin_refresh_token', refreshToken);

  // Fetch profile and verify admin status
  const profile = await api('/auth/profile/');
  currentUser = profile.data;
  localStorage.setItem('admin_user', JSON.stringify(currentUser));

  // Test admin access
  try {
    await api('/admin/dashboard/');
  } catch (e) {
    doLogout();
    throw new Error('This account does not have admin privileges.');
  }

  return currentUser;
}

function doLogout() {
  accessToken = '';
  refreshToken = '';
  currentUser = null;
  localStorage.removeItem('admin_access_token');
  localStorage.removeItem('admin_refresh_token');
  localStorage.removeItem('admin_user');
  showLogin();
}

// ── Navigation ───────────────────────────────────────────────────────────────

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
}

function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  document.getElementById('admin-name').textContent = currentUser?.full_name || 'Admin';
  document.getElementById('avatar-letter').textContent = (currentUser?.full_name || 'A')[0].toUpperCase();
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-NG', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  navigateTo('dashboard');
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  const titles = { dashboard:'Dashboard', users:'User Management', transactions:'Transaction Monitor', meters:'Meter Management', audit:'Audit Logs' };
  document.getElementById('page-title').textContent = titles[page] || 'Dashboard';

  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="flex items-center justify-center py-20"><div class="animate-spin w-8 h-8 border-4 border-brand-600 border-t-transparent rounded-full"></div></div>';

  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'users': renderUsers(); break;
    case 'transactions': renderTransactions(); break;
    case 'meters': renderMeters(); break;
    case 'audit': renderAuditLogs(); break;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function formatMoney(v) { return '₦' + Number(v || 0).toLocaleString('en-NG', { minimumFractionDigits: 0 }); }
function formatDate(d) { if (!d) return 'N/A'; return new Date(d).toLocaleString('en-NG', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
function shortDate(d) { if (!d) return 'N/A'; return new Date(d).toLocaleDateString('en-NG', { month:'short', day:'numeric', year:'numeric' }); }

function statusBadge(status) {
  const map = {
    SUCCESS:'badge-success', DELIVERED:'badge-success', COMPLETED:'badge-success',
    PENDING:'badge-warning', PROCESSING:'badge-warning',
    FAILED:'badge-danger', EXPIRED:'badge-danger',
  };
  return `<span class="badge ${map[status] || 'badge-gray'}">${status}</span>`;
}

function escapeHtml(s) {
  const el = document.createElement('span');
  el.textContent = s || '';
  return el.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAGE: DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════

async function renderDashboard() {
  const content = document.getElementById('page-content');
  try {
    const res = await api('/admin/dashboard/');
    const s = res.data;

    content.innerHTML = `
      <div class="fade-in">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
          <div class="stat-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-3">
              <span class="text-2xl">👥</span>
              <span class="text-xs font-semibold text-brand-600 bg-brand-50 px-2 py-1 rounded-full">USERS</span>
            </div>
            <p class="text-3xl font-bold text-gray-900">${s.total_users}</p>
            <p class="text-sm text-gray-500 mt-1">Total registered users</p>
          </div>
          <div class="stat-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-3">
              <span class="text-2xl">💰</span>
              <span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-full">REVENUE</span>
            </div>
            <p class="text-3xl font-bold text-gray-900">${formatMoney(s.total_revenue)}</p>
            <p class="text-sm text-gray-500 mt-1">Total successful revenue</p>
          </div>
          <div class="stat-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-3">
              <span class="text-2xl">📦</span>
              <span class="text-xs font-semibold text-purple-600 bg-purple-50 px-2 py-1 rounded-full">TRANSACTIONS</span>
            </div>
            <p class="text-3xl font-bold text-gray-900">${s.total_transactions}</p>
            <p class="text-sm text-gray-500 mt-1">All time transactions</p>
          </div>
          <div class="stat-card bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-3">
              <span class="text-2xl">⚡</span>
              <span class="text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded-full">TOKENS</span>
            </div>
            <p class="text-3xl font-bold text-gray-900">${s.delivered_tokens}</p>
            <p class="text-sm text-gray-500 mt-1">Tokens delivered</p>
          </div>
        </div>

        <!-- Second row: Payment & Token Breakdown -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
          <!-- Payment Status -->
          <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
            <h3 class="font-bold text-gray-900 mb-4">Payment Status Breakdown</h3>
            <div class="space-y-3">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div><span class="text-sm text-gray-600">Successful</span></div>
                <span class="font-semibold text-gray-900">${s.successful_payments}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-green-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.successful_payments/s.total_transactions*100) : 0}%"></div></div>

              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-yellow-500"></div><span class="text-sm text-gray-600">Pending</span></div>
                <span class="font-semibold text-gray-900">${s.pending_payments}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-yellow-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.pending_payments/s.total_transactions*100) : 0}%"></div></div>

              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-red-500"></div><span class="text-sm text-gray-600">Failed</span></div>
                <span class="font-semibold text-gray-900">${s.failed_payments}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-red-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.failed_payments/s.total_transactions*100) : 0}%"></div></div>
            </div>
          </div>

          <!-- Token Status -->
          <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
            <h3 class="font-bold text-gray-900 mb-4">Token Delivery Status</h3>
            <div class="space-y-3">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div><span class="text-sm text-gray-600">Delivered</span></div>
                <span class="font-semibold text-gray-900">${s.delivered_tokens}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-green-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.delivered_tokens/s.total_transactions*100) : 0}%"></div></div>

              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-yellow-500"></div><span class="text-sm text-gray-600">Pending</span></div>
                <span class="font-semibold text-gray-900">${s.pending_tokens}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-yellow-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.pending_tokens/s.total_transactions*100) : 0}%"></div></div>

              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-red-500"></div><span class="text-sm text-gray-600">Failed</span></div>
                <span class="font-semibold text-gray-900">${s.failed_tokens}</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2"><div class="bg-red-500 h-2 rounded-full" style="width:${s.total_transactions ? (s.failed_tokens/s.total_transactions*100) : 0}%"></div></div>
            </div>
          </div>
        </div>

        <!-- Charts row: Revenue Trend + Token Delivery -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
            <h3 class="font-bold text-gray-900 mb-4">30-Day Revenue Trend</h3>
            <canvas id="revenueChart" height="200"></canvas>
          </div>
          <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
            <h3 class="font-bold text-gray-900 mb-4">Token Delivery Overview</h3>
            <canvas id="tokenChart" height="200"></canvas>
          </div>
        </div>
      </div>
    `;

    // Revenue line chart
    let revenueData = { labels: [], values: [] };
    try {
      const rev = await api('/admin/daily-revenue/');
      revenueData.labels = rev.data.map(r => r.date);
      revenueData.values = rev.data.map(r => r.revenue);
    } catch(_) {}
    new Chart(document.getElementById('revenueChart'), {
      type: 'line',
      data: {
        labels: revenueData.labels,
        datasets: [{
          label: 'Revenue (₦)',
          data: revenueData.values,
          borderColor: '#1a6df5',
          backgroundColor: 'rgba(26,109,245,0.08)',
          borderWidth: 2,
          pointRadius: 3,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { callback: v => '₦' + Number(v).toLocaleString('en-NG', { notation: 'compact' }) } }
        }
      }
    });

    // Token delivery doughnut
    new Chart(document.getElementById('tokenChart'), {
      type: 'doughnut',
      data: {
        labels: ['Delivered', 'Pending', 'Failed'],
        datasets: [{ data: [s.delivered_tokens, s.pending_tokens, s.failed_tokens], backgroundColor: ['#22c55e','#eab308','#ef4444'], borderWidth: 0 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

  } catch (e) {
    content.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4">${escapeHtml(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAGE: USERS
// ═══════════════════════════════════════════════════════════════════════════════

let usersPage = 1;
let usersSearch = '';

async function renderUsers() {
  const content = document.getElementById('page-content');
  try {
    const params = new URLSearchParams({ page: usersPage });
    if (usersSearch) params.set('search', usersSearch);
    const res = await api('/admin/users/?' + params);
    const users = res.results || res.data || [];
    const count = res.count || users.length;
    const totalPages = Math.ceil(count / 20) || 1;

    content.innerHTML = `
      <div class="fade-in">
        <!-- Search bar -->
        <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm mb-6 flex items-center gap-4">
          <div class="flex-1 relative">
            <input type="text" id="user-search" placeholder="Search by phone or name..." value="${escapeHtml(usersSearch)}"
              class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm" />
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
          </div>
          <button onclick="usersSearch=document.getElementById('user-search').value; usersPage=1; renderUsers();"
            class="bg-brand-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-brand-700 transition">Search</button>
          ${usersSearch ? `<button onclick="usersSearch=''; usersPage=1; renderUsers();" class="text-sm text-gray-500 hover:text-gray-700">Clear</button>` : ''}
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <p class="text-sm text-gray-500"><span class="font-semibold text-gray-900">${count}</span> users found</p>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                  <th class="px-6 py-3">User</th>
                  <th class="px-6 py-3">Phone</th>
                  <th class="px-6 py-3">Status</th>
                  <th class="px-6 py-3">Transactions</th>
                  <th class="px-6 py-3">Joined</th>
                  <th class="px-6 py-3">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                ${users.map(u => `

async function toggleSuspend(userId, isActive) {
  const action = isActive ? 'suspend' : 'reactivate';
  const reason = prompt(`Reason to ${action} this user (optional):`);
  if (reason === null) return; // cancelled
  try {
    await api(`/admin/users/${userId}/suspend/`, {
      method: 'POST',
      body: JSON.stringify({ reason: reason || '' }),
    });
    alert(`User ${action}d successfully.`);
    renderUsers();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function resolveTransaction(id, ref) {
  const notes = prompt(`Resolution notes for ${ref}:`);
  if (!notes) return;
  try {
    await api(`/admin/transactions/${id}/resolve/`, {
      method: 'POST',
      body: JSON.stringify({ resolution_notes: notes }),
    });
    alert('Transaction resolved.');
    renderTransactions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                  <th class="px-6 py-3">Timestamp</th>
                  <th class="px-6 py-3">Actor</th>
                  <th class="px-6 py-3">Action</th>
                  <th class="px-6 py-3">Target</th>
                  <th class="px-6 py-3">IP Address</th>
                  <th class="px-6 py-3">Details</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                ${logs.map(l => `
                  <tr class="table-row">
                    <td class="px-6 py-3 text-xs text-gray-500 whitespace-nowrap">${formatDate(l.timestamp)}</td>
                    <td class="px-6 py-3 text-sm font-medium text-gray-900">${escapeHtml(l.actor_label)}</td>
                    <td class="px-6 py-3"><span class="badge badge-info">${escapeHtml(l.action)}</span></td>
                    <td class="px-6 py-3 text-sm text-gray-700">${escapeHtml(l.target_type)}${l.target_id ? ':' + escapeHtml(l.target_id).slice(0,8) + '…' : ''}</td>
                    <td class="px-6 py-3 text-xs font-mono text-gray-500">${escapeHtml(l.ip_address || 'N/A')}</td>
                    <td class="px-6 py-3 text-xs text-gray-500 max-w-xs truncate">${escapeHtml(JSON.stringify(l.metadata || {})).slice(0, 80)}</td>
                  </tr>
                `).join('')}
                ${logs.length === 0 ? '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">No audit logs found</td></tr>' : ''}
              </tbody>
            </table>
          </div>
          <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
            <p class="text-sm text-gray-500">Page ${auditPage} of ${totalPages}</p>
            <div class="flex gap-2">
              <button onclick="if(auditPage>1){auditPage--;renderAuditLogs()}" ${auditPage<=1?'disabled':''} class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 hover:bg-gray-50 disabled:opacity-40 transition">← Prev</button>
              <button onclick="if(auditPage<${totalPages}){auditPage++;renderAuditLogs()}" ${auditPage>=totalPages?'disabled':''} class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 hover:bg-gray-50 disabled:opacity-40 transition">Next →</button>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('audit-search')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') { auditSearch = e.target.value; auditPage = 1; renderAuditLogs(); }
    });

  } catch (e) {
    content.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4">${escapeHtml(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════

// Login form handler
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errDiv = document.getElementById('login-error');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errDiv.classList.add('hidden');

  try {
    await doLogin(email, password);
    showApp();
  } catch (err) {
    errDiv.textContent = err.message;
    errDiv.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In to Admin';
  }
});

// Sidebar navigation
document.querySelectorAll('.sidebar-link').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo(link.dataset.page);
  });
});

// Logout
document.getElementById('logout-btn').addEventListener('click', () => {
  if (confirm('Sign out of admin dashboard?')) doLogout();
});

// Auto-login check
if (accessToken && currentUser) {
  // Verify the token still works
  api('/admin/dashboard/')
    .then(() => showApp())
    .catch(() => { doLogout(); showLogin(); });
} else {
  showLogin();
}
</script>
</body>
</html>

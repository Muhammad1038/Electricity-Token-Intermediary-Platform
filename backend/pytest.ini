[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests/test_*.py apps/*/tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=apps
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70
    -v
    --tb=short
filterwarnings =
    ignore::DeprecationWarning

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    staticfiles,
    media
ignore =
    E203,
    W503,
    E501

[isort]
profile = black
known_django = django
known_first_party = apps,config
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

